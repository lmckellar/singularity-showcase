<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SINGULARITY — Black Hole Explorer</title>

<meta name="author" content="Lachlan McKellar">

<meta property="og:description" content="Interactive Three.js black hole explorer built as a technical showcase.">
<meta property="og:type" content="website">

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='black'/%3E%3Ccircle cx='32' cy='32' r='21' fill='none' stroke='%236fe3ff' stroke-width='3'/%3E%3Ccircle cx='32' cy='32' r='8' fill='%23000' stroke='%23ffb45e' stroke-width='3'/%3E%3C/svg%3E">
<style>
  :root{
    --cyan:#6fe3ff; --cyan-dim:rgba(111,227,255,.35);
    --amber:#ffb45e; --amber-dim:rgba(255,180,94,.4);
    --glass:rgba(8,14,22,.55);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;
    font-family:'JetBrains Mono','Fira Code','Cascadia Code',Consolas,'Courier New',monospace;
    color:var(--cyan);-webkit-user-select:none;user-select:none}
  canvas{display:block;cursor:grab}
  canvas:active{cursor:grabbing}

  /* ---------- title ---------- */
  #title{position:fixed;left:50%;top:44%;transform:translate(-50%,-50%);
    text-align:center;pointer-events:none;opacity:0;transition:opacity 2.2s ease, top 1.6s cubic-bezier(.5,0,.2,1), font-size 1.6s cubic-bezier(.5,0,.2,1);z-index:20}
  #title h1{font-size:clamp(42px,7vw,96px);font-weight:400;letter-spacing:.42em;text-indent:.42em;
    color:#eaf7ff;text-shadow:0 0 24px rgba(111,227,255,.8),0 0 90px rgba(111,227,255,.35);
    transition:font-size 1.6s cubic-bezier(.5,0,.2,1)}
  #title p{margin-top:14px;font-size:12px;letter-spacing:.55em;text-indent:.55em;color:var(--cyan);
    opacity:.8;transition:opacity 1s}
  #title.show{opacity:1}
  #title.dock{top:34px}
  #title.dock h1{font-size:clamp(16px,2vw,22px);text-shadow:0 0 12px rgba(111,227,255,.6)}
  #title.dock p{opacity:0;margin-top:0;height:0;overflow:hidden}

  /* ---------- HUD frame ---------- */
  .hud-corner{position:fixed;width:56px;height:56px;pointer-events:none;z-index:15;opacity:0;transition:opacity 1.5s}
  body.ready .hud-corner{opacity:.9}
  .hud-corner.tl{top:14px;left:14px;border-top:1px solid var(--cyan-dim);border-left:1px solid var(--cyan-dim)}
  .hud-corner.tr{top:14px;right:14px;border-top:1px solid var(--cyan-dim);border-right:1px solid var(--cyan-dim)}
  .hud-corner.bl{bottom:14px;left:14px;border-bottom:1px solid var(--amber-dim);border-left:1px solid var(--amber-dim)}
  .hud-corner.br{bottom:14px;right:14px;border-bottom:1px solid var(--amber-dim);border-right:1px solid var(--amber-dim)}

  /* ---------- telemetry ---------- */
  #telemetry{position:fixed;top:34px;left:34px;z-index:15;font-size:11px;line-height:1.9;
    letter-spacing:.08em;pointer-events:none;opacity:0;transition:opacity 1.5s;white-space:pre}
  body.ready #telemetry{opacity:1}
  #telemetry .hdr{color:var(--amber);border-bottom:1px solid var(--amber-dim);padding-bottom:4px;margin-bottom:6px;letter-spacing:.3em}
  #telemetry .val{color:#dff6ff}

  /* ---------- hint ---------- */
  #hint{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);font-size:10px;
    letter-spacing:.35em;color:rgba(111,227,255,.55);z-index:15;pointer-events:none;
    opacity:0;transition:opacity 2s}
  body.ready #hint{opacity:1}

  /* ---------- control panel ---------- */
  #panel{position:fixed;left:34px;bottom:44px;z-index:16;width:250px;padding:16px 18px 18px;
    background:var(--glass);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(111,227,255,.22);border-radius:10px;
    box-shadow:0 0 30px rgba(0,0,0,.6), inset 0 0 24px rgba(111,227,255,.03);
    opacity:0;transition:opacity 1.5s}
  body.ready #panel{opacity:1}
  #panel .hdr{font-size:10px;letter-spacing:.3em;color:var(--amber);margin-bottom:12px;
    border-bottom:1px solid var(--amber-dim);padding-bottom:6px}
  .ctl{margin-bottom:12px}
  .ctl label{display:flex;justify-content:space-between;font-size:10px;letter-spacing:.12em;margin-bottom:5px}
  .ctl label span{color:#dff6ff}
  input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:2px;background:rgba(111,227,255,.25);outline:none;border-radius:1px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:12px;height:12px;border-radius:50%;
    background:#0a141c;border:1px solid var(--cyan);box-shadow:0 0 8px rgba(111,227,255,.8);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;
    background:#0a141c;border:1px solid var(--cyan);box-shadow:0 0 8px rgba(111,227,255,.8);cursor:pointer}
  #spagBtn{width:100%;margin-top:4px;padding:10px 0;background:rgba(255,180,94,.08);
    border:1px solid var(--amber-dim);border-radius:6px;color:var(--amber);
    font-family:inherit;font-size:11px;letter-spacing:.25em;cursor:pointer;transition:all .25s}
  #spagBtn:hover{background:rgba(255,180,94,.2);box-shadow:0 0 18px rgba(255,180,94,.35)}
  #spagBtn:disabled{opacity:.35;cursor:default;box-shadow:none}

  /* ---------- markers ---------- */
  .marker{position:fixed;left:0;top:0;z-index:14;cursor:pointer;
    width:34px;height:34px;opacity:1;transition:opacity .3s;will-change:transform}
  .marker.off{opacity:0;visibility:hidden;pointer-events:none}
  .marker.off .ring{animation:none}
  .marker .ring{position:absolute;inset:0;border:1px solid var(--cyan);border-radius:50%;
    animation:pulse 2.4s ease-out infinite}
  .marker .dot{position:absolute;left:50%;top:50%;width:5px;height:5px;transform:translate(-50%,-50%);
    background:var(--cyan);border-radius:50%;box-shadow:0 0 8px var(--cyan)}
  .marker .lbl{position:absolute;left:40px;top:50%;transform:translateY(-50%);font-size:9px;
    letter-spacing:.25em;white-space:nowrap;color:rgba(223,246,255,.85);
    text-shadow:0 0 6px rgba(0,0,0,.9);opacity:0;transition:opacity .25s}
  .marker:hover .lbl{opacity:1}
  .marker:hover .ring{border-color:var(--amber);animation-duration:1s}
  @keyframes pulse{0%{transform:scale(.55);opacity:.9}100%{transform:scale(1.25);opacity:0}}

  /* ---------- info card ---------- */
  #card{position:fixed;right:40px;top:50%;transform:translateY(-50%) translateX(40px);
    width:330px;padding:22px 24px;z-index:18;
    background:var(--glass);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);
    border:1px solid rgba(111,227,255,.28);border-radius:12px;
    box-shadow:0 0 50px rgba(0,0,0,.7), inset 0 0 30px rgba(111,227,255,.04);
    opacity:0;pointer-events:none;transition:opacity .45s, transform .45s cubic-bezier(.2,.7,.3,1)}
  #card.open{opacity:1;pointer-events:auto;transform:translateY(-50%) translateX(0)}
  #card::before{content:"";position:absolute;top:-1px;left:18px;right:18px;height:1px;
    background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
  #card .tag{font-size:9px;letter-spacing:.35em;color:var(--amber);margin-bottom:8px}
  #card h2{font-size:19px;font-weight:400;letter-spacing:.18em;color:#eaf7ff;margin-bottom:14px;
    text-shadow:0 0 14px rgba(111,227,255,.5)}
  #card .desc{font-size:11.5px;line-height:1.75;color:rgba(223,246,255,.82);margin-bottom:16px;letter-spacing:.02em}
  #card .stats{border-top:1px solid rgba(111,227,255,.18);padding-top:12px;font-size:10.5px;line-height:2.1}
  #card .stats .row{display:flex;justify-content:space-between}
  #card .stats .k{color:rgba(111,227,255,.7);letter-spacing:.12em}
  #card .stats .v{color:var(--amber)}
  #cardClose{position:absolute;top:12px;right:14px;background:none;border:1px solid rgba(111,227,255,.3);
    color:var(--cyan);width:24px;height:24px;border-radius:5px;cursor:pointer;font-family:inherit;
    font-size:11px;line-height:1;transition:all .2s}
  #cardClose:hover{border-color:var(--amber);color:var(--amber)}

  #scanline{position:fixed;inset:0;z-index:30;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.012) 0 1px,transparent 1px 3px)}
</style>
</head>
<body>

<div id="title"><h1>SINGULARITY</h1><p>INTERACTIVE BLACK HOLE EXPLORER</p></div>

<div class="hud-corner tl"></div><div class="hud-corner tr"></div>
<div class="hud-corner bl"></div><div class="hud-corner br"></div>

<div id="telemetry"><div class="hdr">TELEMETRY</div><div id="teleBody"></div></div>

<div id="panel">
  <div class="hdr">CONTROL // GRAV-SIM</div>
  <div class="ctl"><label>BLACK HOLE MASS <span id="massVal"></span></label>
    <input type="range" id="massSlider" min="1" max="100" step="0.5" value="10"></div>
  <div class="ctl"><label>DISK BRIGHTNESS <span id="brightVal"></span></label>
    <input type="range" id="brightSlider" min="0.15" max="2.2" step="0.01" value="1"></div>
  <div class="ctl"><label>TIME FLOW <span id="timeVal"></span></label>
    <input type="range" id="timeSlider" min="0" max="3" step="0.01" value="1"></div>

<div id="errbox" style="display:none;position:fixed;left:50%;bottom:60px;transform:translateX(-50%);z-index:40;max-width:80vw;padding:10px 16px;background:rgba(40,5,5,.85);border:1px solid #ff5e5e;border-radius:6px;color:#ffb0b0;font-size:11px;white-space:pre-wrap"></div>
<script>
addEventListener('error', e=>{
  const b=document.getElementById('errbox');
  b.style.display='block';
  b.textContent='SIM ERROR: '+(e.message||e.error||'failed to load module');
}, true);
if(!document.createElement('canvas').getContext('webgl2') && !document.createElement('canvas').getContext('webgl')){
  const b=document.getElementById('errbox');
  b.style.display='block'; b.textContent='SIM ERROR: WebGL is not available in this browser.';
}
</script>

<!-- Three.js r160 (MIT, (c) 2010-2023 Three.js Authors) served as a local module for cross-browser compatibility. -->
<script type="module">
import * as THREE from './vendor/three.module.r160.js';

const SUP='⁰¹²³⁴⁵⁶⁷⁸⁹';

/* ================= renderer / scene ================= */
const renderer = new THREE.WebGLRenderer({antialias:false, powerPreference:'default'});
const DPR_FULL = Math.min(devicePixelRatio, 1.5);
renderer.setPixelRatio(DPR_FULL);
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 4000);

const bhGroup = new THREE.Group();
bhGroup.rotation.set(0.26, 0, 0.09);
scene.add(bhGroup);

/* ================= procedural textures ================= */
function makeCanvas(size, draw){
  const c = document.createElement('canvas'); c.width = c.height = size;
  draw(c.getContext('2d'), size);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
const softTex = makeCanvas(64,(ctx,s)=>{
  const g = ctx.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(0.3,'rgba(255,255,255,.55)');
  g.addColorStop(0.7,'rgba(255,255,255,.12)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,s,s);
});
const starTex = makeCanvas(32,(ctx,s)=>{
  const g = ctx.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(0.35,'rgba(255,255,255,.7)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,s,s);
});
const glowTex = makeCanvas(256,(ctx,s)=>{
  const g = ctx.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  g.addColorStop(0,'rgba(255,170,90,.85)');
  g.addColorStop(0.35,'rgba(255,120,45,.28)');
  g.addColorStop(0.7,'rgba(200,70,20,.07)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,s,s);
});
const ringTex = makeCanvas(512,(ctx,s)=>{
  const cx=s/2, R=s*0.35;
  ctx.globalCompositeOperation='lighter';
  const strokes=[
    {w:26, a:.10, c:'255,140,60',  b:60},
    {w:14, a:.30, c:'255,190,120',b:34},
    {w:6,  a:.85, c:'255,240,220',b:18},
    {w:2.5,a:1.0, c:'255,255,255',b:8},
  ];
  for(const st of strokes){
    ctx.beginPath(); ctx.arc(cx,cx,R,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${st.c},${st.a})`;
    ctx.lineWidth=st.w;
    ctx.shadowColor=`rgba(${st.c},.9)`; ctx.shadowBlur=st.b;
    ctx.stroke();
  }
});

/* ================= event horizon ================= */
const horizon = new THREE.Mesh(
  new THREE.SphereGeometry(1, 64, 48),
  new THREE.MeshBasicMaterial({color:0x000000})
);
bhGroup.add(horizon);

/* ================= photon ring (camera-facing sprite) ================= */
const photonRing = new THREE.Sprite(new THREE.SpriteMaterial({
  map:ringTex, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity:0.95
}));
photonRing.scale.setScalar(1.38/0.35);
bhGroup.add(photonRing);

/* ================= ambient disk glow (fake bloom) ================= */
const diskGlow = new THREE.Sprite(new THREE.SpriteMaterial({
  map:glowTex, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity:0.22
}));
diskGlow.scale.setScalar(26);
bhGroup.add(diskGlow);

/* ================= ergosphere shell ================= */
const ergo = new THREE.Mesh(
  new THREE.SphereGeometry(1, 48, 32),
  new THREE.ShaderMaterial({
    transparent:true, blending:THREE.AdditiveBlending, depthWrite:false,
    vertexShader:`
      varying float vFres;
      void main(){
        vec3 n = normalize(normalMatrix * normal);
        vec4 mv = modelViewMatrix * vec4(position,1.0);
        vFres = pow(1.0 - abs(dot(n, normalize(-mv.xyz))), 3.0);
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader:`
      varying float vFres;
      void main(){ gl_FragColor = vec4(vec3(0.55,0.85,1.0)*vFres, vFres*0.10); }`
  })
);
ergo.scale.set(1.85, 1.05, 1.85);
bhGroup.add(ergo);

/* ================= accretion disk — 20 000 particles ================= */
const DISK_N = 20000, DISK_IN = 3.0, DISK_OUT = 13.0;
const diskUniforms = {
  uTime:{value:0}, uBright:{value:1}, uTex:{value:softTex}, uPx:{value:1}
};
{
  const pos = new Float32Array(DISK_N*3);
  const aRad = new Float32Array(DISK_N);
  const aAng = new Float32Array(DISK_N);
  const aY   = new Float32Array(DISK_N);
  const aSize= new Float32Array(DISK_N);
  const aSeed= new Float32Array(DISK_N);
  for(let i=0;i<DISK_N;i++){
    const r = DISK_IN + (DISK_OUT-DISK_IN)*Math.pow(Math.random(),1.7);
    aRad[i]=r;
    aAng[i]=Math.random()*Math.PI*2;
    aY[i]=(Math.random()+Math.random()+Math.random()-1.5)/1.5; // ~gaussian
    aSize[i]=0.5+Math.random()*1.3;
    aSeed[i]=0.55+Math.random()*0.7;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  g.setAttribute('aRad', new THREE.BufferAttribute(aRad,1));
  g.setAttribute('aAng', new THREE.BufferAttribute(aAng,1));
  g.setAttribute('aY',   new THREE.BufferAttribute(aY,1));
  g.setAttribute('aSize',new THREE.BufferAttribute(aSize,1));
  g.setAttribute('aSeed',new THREE.BufferAttribute(aSeed,1));
  g.boundingSphere = new THREE.Sphere(new THREE.Vector3(), DISK_OUT+1);

  const mat = new THREE.ShaderMaterial({
    uniforms:diskUniforms, transparent:true, depthWrite:false, depthTest:true,
    blending:THREE.AdditiveBlending,
    vertexShader:`
      attribute float aRad, aAng, aY, aSize, aSeed;
      uniform float uTime, uPx;
      varying vec3 vColor;
      void main(){
        float ang = aAng + uTime * 3.0 * pow(aRad, -1.5);
        vec3 p = vec3(cos(ang)*aRad, aY*(0.05+0.045*(aRad-${DISK_IN.toFixed(1)}))*1.4, sin(ang)*aRad);
        vec4 world = modelMatrix * vec4(p,1.0);
        vec4 mv = viewMatrix * world;
        gl_Position = projectionMatrix * mv;
        gl_PointSize = aSize * uPx / max(0.1,-mv.z);

        float t = clamp((aRad-${DISK_IN.toFixed(1)})/${(DISK_OUT-DISK_IN).toFixed(1)}, 0.0, 1.0);
        vec3 c1 = vec3(1.00,0.99,0.94);   // white-hot inner edge
        vec3 c2 = vec3(1.00,0.72,0.34);
        vec3 c3 = vec3(0.90,0.30,0.06);   // deep orange rim
        vec3 col = t<0.35 ? mix(c1,c2,t/0.35) : mix(c2,c3,(t-0.35)/0.65);
        // relativistic beaming: side moving toward camera glows brighter
        vec3 vel = normalize(mat3(modelMatrix)*vec3(-sin(ang),0.0,cos(ang)));
        vec3 toCam = normalize(cameraPosition - world.xyz);
        float beam = max(0.15, 1.0 + 0.55*dot(vel, toCam));
        vColor = col * mix(1.9,0.45,t) * beam * aSeed;
      }`,
    fragmentShader:`
      uniform sampler2D uTex; uniform float uBright;
      varying vec3 vColor;
      void main(){
        float a = texture2D(uTex, gl_PointCoord).r;
        gl_FragColor = vec4(vColor * uBright * a, a);
      }`
  });
  bhGroup.add(new THREE.Points(g, mat));
}

/* ================= relativistic jets ================= */
const JET_N = 3000;
const jetUniforms = { uTime:{value:0}, uTex:{value:softTex}, uPx:{value:1} };
{
  const pos = new Float32Array(JET_N*3);
  const aOff = new Float32Array(JET_N);
  const aSpd = new Float32Array(JET_N);
  const aAng = new Float32Array(JET_N);
  const aSign= new Float32Array(JET_N);
  const aSize= new Float32Array(JET_N);
  for(let i=0;i<JET_N;i++){
    aOff[i]=Math.random(); aSpd[i]=0.6+Math.random()*0.8;
    aAng[i]=Math.random()*Math.PI*2; aSign[i]=i%2?1:-1;
    aSize[i]=0.4+Math.random()*0.9;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  g.setAttribute('aOff', new THREE.BufferAttribute(aOff,1));
  g.setAttribute('aSpd', new THREE.BufferAttribute(aSpd,1));
  g.setAttribute('aAng', new THREE.BufferAttribute(aAng,1));
  g.setAttribute('aSign',new THREE.BufferAttribute(aSign,1));
  g.setAttribute('aSize',new THREE.BufferAttribute(aSize,1));
  g.boundingSphere = new THREE.Sphere(new THREE.Vector3(), 20);

  const mat = new THREE.ShaderMaterial({
    uniforms:jetUniforms, transparent:true, depthWrite:false,
    blending:THREE.AdditiveBlending,
    vertexShader:`
      attribute float aOff,aSpd,aAng,aSign,aSize;
      uniform float uTime,uPx;
      varying vec4 vColor;
      void main(){
        float h = fract(aOff + uTime*aSpd*0.09);
        float rad = 0.10 + pow(h,0.85)*1.35;
        float ang = aAng + uTime*aSign*1.6 + h*5.0;
        vec3 p = vec3(cos(ang)*rad, aSign*(1.15+h*16.0), sin(ang)*rad);
        vec4 mv = modelViewMatrix * vec4(p,1.0);
        gl_Position = projectionMatrix * mv;
        gl_PointSize = aSize * uPx * 0.8 / max(0.1,-mv.z);
        float fade = (1.0-h)*smoothstep(0.0,0.06,h);
        vColor = vec4(mix(vec3(0.8,0.93,1.0), vec3(0.35,0.55,1.0), h), fade*0.30);
      }`,
    fragmentShader:`
      uniform sampler2D uTex;
      varying vec4 vColor;
      void main(){
        float a = texture2D(uTex, gl_PointCoord).r;
        gl_FragColor = vec4(vColor.rgb*a, a) * vColor.a;
      }`
  });
  bhGroup.add(new THREE.Points(g, mat));
}

/* ================= lensed starfield ================= */
const STAR_N = 6000;
const starUniforms = {
  uTex:{value:starTex}, uBH:{value:new THREE.Vector2()},
  uLens:{value:0}, uAspect:{value:1}
};
{
  const pos = new Float32Array(STAR_N*3);
  const aSize = new Float32Array(STAR_N);
  const aCol = new Float32Array(STAR_N*3);
  for(let i=0;i<STAR_N;i++){
    const v = new THREE.Vector3().randomDirection().multiplyScalar(900);
    pos.set([v.x,v.y,v.z], i*3);
    aSize[i] = 1.0 + Math.pow(Math.random(),3)*3.2;
    const w = Math.random();
    const col = w<0.75 ? [1,1,1] : (w<0.88 ? [0.75,0.85,1] : [1,0.82,0.62]);
    const b = 0.4+Math.random()*0.6;
    aCol.set([col[0]*b,col[1]*b,col[2]*b], i*3);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  g.setAttribute('aSize', new THREE.BufferAttribute(aSize,1));
  g.setAttribute('aCol', new THREE.BufferAttribute(aCol,3));

  const mat = new THREE.ShaderMaterial({
    uniforms:starUniforms, transparent:true, depthWrite:false,
    blending:THREE.AdditiveBlending,
    vertexShader:`
      attribute float aSize; attribute vec3 aCol;
      uniform vec2 uBH; uniform float uLens, uAspect;
      varying vec3 vColor;
      void main(){
        vec4 clip = projectionMatrix * modelViewMatrix * vec4(position,1.0);
        float mag = 1.0;
        if(clip.w > 0.0 && uLens > 0.0){
          vec2 ndc = clip.xy / clip.w;
          vec2 p = vec2(ndc.x*uAspect, ndc.y);
          vec2 b = vec2(uBH.x*uAspect, uBH.y);
          vec2 d = p - b;
          float r = max(length(d), 1e-3);
          float rn = r + uLens / r;              // deflection outward -> Einstein ring
          vec2 pn = b + d * (rn / r);
          clip.xy = vec2(pn.x/uAspect, pn.y) * clip.w;
          mag = clamp(1.0 + 1.4*uLens/(r*r), 1.0, 3.5);
        }
        gl_Position = clip;
        gl_PointSize = aSize * sqrt(mag);
        vColor = aCol;
      }`,
    fragmentShader:`
      uniform sampler2D uTex;
      varying vec3 vColor;
      void main(){
        float a = texture2D(uTex, gl_PointCoord).r;
        gl_FragColor = vec4(vColor*a, a);
      }`
  });
  const stars = new THREE.Points(g, mat);
  stars.frustumCulled = false;
  scene.add(stars);
}

/* ================= camera rig ================= */
const sph = { theta:-2.5, phi:1.18, r:320 };
const camTarget = new THREE.Vector3();
let fly = null, lastInput = 0, introDone = false;

function applyCamera(){
  camera.position.set(
    camTarget.x + sph.r*Math.sin(sph.phi)*Math.sin(sph.theta),
    camTarget.y + sph.r*Math.cos(sph.phi),
    camTarget.z + sph.r*Math.sin(sph.phi)*Math.cos(sph.theta));
  camera.lookAt(camTarget);
}
const easeIO = t => t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
const easeOut = t => 1-Math.pow(1-t,4);
function wrapPI(a){ while(a> Math.PI)a-=2*Math.PI; while(a<-Math.PI)a+=2*Math.PI; return a; }

function flyTo(to, dur=2.2, ease=easeIO, onDone=null){
  fly = { t:0, dur, ease, onDone,
    from:{theta:sph.theta, phi:sph.phi, r:sph.r, target:camTarget.clone()},
    to:{...to, theta: sph.theta + wrapPI(to.theta - sph.theta)} };
}
function stepFly(dt){
  if(!fly) return;
  fly.t += dt;
  const k = fly.ease(Math.min(1, fly.t/fly.dur));
  sph.theta = fly.from.theta + (fly.to.theta-fly.from.theta)*k;
  sph.phi   = fly.from.phi   + (fly.to.phi  -fly.from.phi  )*k;
  sph.r     = fly.from.r     + (fly.to.r    -fly.from.r    )*k;
  camTarget.lerpVectors(fly.from.target, fly.to.target, k);
  if(fly.t >= fly.dur){ const cb=fly.onDone; fly=null; if(cb) cb(); }
}

/* input */
let dragging=false, px=0, py=0;
const cvs = renderer.domElement;
cvs.addEventListener('pointerdown', e=>{ dragging=true; px=e.clientX; py=e.clientY; fly=null; finishIntro(0); lastInput=now(); });
addEventListener('pointerup', ()=>dragging=false);
addEventListener('pointermove', e=>{
  if(!dragging) return;
  sph.theta -= (e.clientX-px)*0.005;
  sph.phi = Math.max(0.15, Math.min(Math.PI-0.15, sph.phi - (e.clientY-py)*0.005));
  px=e.clientX; py=e.clientY; lastInput=now();
});
cvs.addEventListener('wheel', e=>{
  e.preventDefault(); fly=null; finishIntro(0);
  sph.r = Math.max(1.7*scaleCur, Math.min(400, sph.r*Math.exp(e.deltaY*0.0011)));
  lastInput=now();
},{passive:false});
function now(){ return performance.now()/1000; }

/* ================= hotspots ================= */
const HOTSPOTS = [
  { id:'horizon', name:'EVENT HORIZON', tag:'REGION 01 // POINT OF NO RETURN',
    local:new THREE.Vector3(0.72,0.55,0.42).normalize().multiplyScalar(1.04),
    dist:4.2, phi:1.25,
    desc:'The boundary where gravity becomes so strong that nothing, not even light, can escape. Anything crossing this invisible surface is permanently cut off from the rest of the universe.',
    stats:m=>[['MASS', sci(m*1e6)+' M☉'], ['RADIUS', sci(2.95e6*m)+' km'], ['ESCAPE VELOCITY','299 792 km/s (c)']] },
  { id:'photon', name:'PHOTON SPHERE', tag:'REGION 02 // LIGHT IN ORBIT',
    local:new THREE.Vector3(-1.1,0.85,-0.6).normalize().multiplyScalar(1.5),
    dist:5.0, phi:1.15,
    desc:'A razor-thin zone where gravity bends light into complete circles, so photons literally orbit the black hole. Light grazing this region forms the bright ring you can see hugging the shadow.',
    stats:m=>[['RADIUS', sci(1.5*2.95e6*m)+' km'], ['ORBITAL SPEED','299 792 km/s (c)'], ['ORBIT STABILITY','UNSTABLE']] },
  { id:'disk', name:'ACCRETION DISK', tag:'REGION 03 // MATTER FURNACE',
    local:new THREE.Vector3(5.4,0.12,4.1),
    dist:9.5, phi:1.05,
    desc:'A whirlpool of captured gas spiraling inward, heated by friction until it outshines entire galaxies. The inner edge glows white-hot while the outer regions cool to deep orange.',
    stats:m=>[['INNER TEMP', sci(1.2e7*Math.pow(10/m,0.25))+' K'], ['ORBITAL VELOCITY','~0.5 c AT INNER EDGE'], ['SPAN','3 – 13 Rₛ']] },
  { id:'jets', name:'RELATIVISTIC JETS', tag:'REGION 04 // POLAR OUTFLOW',
    local:new THREE.Vector3(0.3,7.6,0.2),
    dist:14, phi:0.85,
    desc:'Twin beams of plasma flung from the poles at nearly the speed of light, powered by magnetic fields twisted by the spinning black hole. They can punch through gas for thousands of light-years.',
    stats:m=>[['VELOCITY','0.98 c'], ['LENGTH','~'+sci(4e3*Math.pow(m/10,0.5))+' ly'], ['POWER', sci(1e38*m)+' W']] },
  { id:'ergo', name:'ERGOSPHERE', tag:'REGION 05 // DRAGGED SPACETIME',
    local:new THREE.Vector3(-1.55,0.35,1.0).normalize().multiplyScalar(1.8).setY(0.35),
    dist:4.6, phi:1.35,
    desc:'A region outside the horizon where the spinning black hole drags space itself around like water around a drain. Nothing here can stand still — but with the right trajectory, you could steal energy and escape.',
    stats:m=>[['EQUATORIAL EXTENT','1.0 – 2.0 Rₛ'], ['FRAME DRAG RATE', sci(0.3/m)+' rad/s'], ['ESCAPE','POSSIBLE']] },
];
const markerEls = HOTSPOTS.map(h=>{
  const el = document.createElement('div');
  el.className='marker off';
  el.innerHTML = `<div class="ring"></div><div class="dot"></div><div class="lbl">${h.name}</div>`;
  el.addEventListener('click', ()=>openHotspot(h));
  document.body.appendChild(el);
  return el;
});

const card = document.getElementById('card');
let cardOpen = false;
function openHotspot(h){
  const world = h.local.clone().applyMatrix4(bhGroup.matrixWorld);
  const az = Math.atan2(world.x, world.z);
  flyTo({ theta: az + 0.65, phi: h.phi, r: h.dist*scaleCur, target: world }, 2.4);
  document.getElementById('cardTag').textContent = h.tag;
  document.getElementById('cardName').textContent = h.name;
  document.getElementById('cardDesc').textContent = h.desc;
  renderStats(h);
  curHotspot = h; cardOpen = true;
  card.classList.add('open');
}
function renderStats(h){
  document.getElementById('cardStats').innerHTML =
    h.stats(massVal).map(([k,v])=>`<div class="row"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('');
}
let curHotspot = null;
document.getElementById('cardClose').addEventListener('click', ()=>{
  cardOpen = false; curHotspot = null;
  card.classList.remove('open');
  flyTo({ theta: sph.theta, phi: 1.18, r: 26*scaleCur, target: new THREE.Vector3() }, 2.0);
});

/* ================= sliders ================= */
let massVal = 10, scaleCur = 1, scaleTar = 1;
let brightness = 1, timeSpeed = 1;
const $ = id => document.getElementById(id);
function fmtMass(){ $('massVal').textContent = sci(massVal*1e6)+' M☉'; }
$('massSlider').addEventListener('input', e=>{
  massVal = +e.target.value;
  scaleTar = Math.pow(massVal/10, 0.3);
  fmtMass();
  if(curHotspot) renderStats(curHotspot);
});
$('brightSlider').addEventListener('input', e=>{
  brightness = +e.target.value;
  $('brightVal').textContent = brightness.toFixed(2)+'×';
});
$('timeSlider').addEventListener('input', e=>{
  timeSpeed = +e.target.value;
  $('timeVal').textContent = timeSpeed.toFixed(2)+'×';
});
fmtMass(); $('brightVal').textContent='1.00×'; $('timeVal').textContent='1.00×';

/* ================= spaghettification demo ================= */
let probe = null, burst = null;
const spagBtn = $('spagBtn');
spagBtn.addEventListener('click', ()=>{
  if(probe) return;
  spagBtn.disabled = true;
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.13, 16, 12),
    new THREE.MeshBasicMaterial({color:0xbfe8ff, blending:THREE.AdditiveBlending, transparent:true, depthWrite:false})
  );
  const glow = new THREE.Sprite(new THREE.SpriteMaterial({
    map:softTex, color:0x9fd8ff, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity:0.9
  }));
  glow.scale.setScalar(0.9);
  mesh.add(glow);
  bhGroup.add(mesh);
  probe = { mesh, glow, u:0, r0:11.5, ang:Math.random()*Math.PI*2 };
});
function stepProbe(dt){
  if(!probe) return;
  probe.u += dt/7;
  const u = probe.u;
  if(u >= 1){
    const p = probe.mesh.position.clone().applyMatrix4(bhGroup.matrixWorld);
    bhGroup.remove(probe.mesh);
    probe.mesh.geometry.dispose();
    spawnBurst(p);
    probe = null;
    setTimeout(()=>spagBtn.disabled=false, 1800);
    return;
  }
  const r = 1.05 + (probe.r0-1.05)*Math.pow(1-u, 1.6);
  probe.ang += dt * 7.5 / Math.pow(r, 1.5);
  const y = 0.6*(1-u)*Math.sin(u*5);
  probe.mesh.position.set(Math.cos(probe.ang)*r, y, Math.sin(probe.ang)*r);
  // tidal stretch along the radial direction
  const s = 1 + 14*Math.pow(u,3.2);
  const dir = probe.mesh.position.clone().normalize();
  probe.mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
  probe.mesh.scale.set(1/Math.sqrt(s), s, 1/Math.sqrt(s));
  probe.glow.scale.setScalar(0.9*(1+u*0.6));
  probe.glow.material.opacity = 0.9*(1-u*0.4);
}
function spawnBurst(worldPos){
  const N=180;
  const pos = new Float32Array(N*3), vel = [];
  for(let i=0;i<N;i++){
    pos.set([worldPos.x,worldPos.y,worldPos.z], i*3);
    const v = new THREE.Vector3().randomDirection().multiplyScalar(1.5+Math.random()*4);
    vel.push(v);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const m = new THREE.PointsMaterial({
    map:softTex, color:0xffc890, size:0.35, transparent:true, depthWrite:false,
    blending:THREE.AdditiveBlending, sizeAttenuation:true
  });
  const pts = new THREE.Points(g,m);
  pts.frustumCulled = false;
  scene.add(pts);
  burst = { pts, vel, life:0 };
}
function stepBurst(dt){
  if(!burst) return;
  burst.life += dt;
  const t = burst.life/1.4;
  if(t>=1){
    scene.remove(burst.pts); burst.pts.geometry.dispose(); burst.pts.material.dispose();
    burst=null; return;
  }
  const a = burst.pts.geometry.attributes.position;
  for(let i=0;i<burst.vel.length;i++){
    const v = burst.vel[i];
    a.array[i*3]+=v.x*dt; a.array[i*3+1]+=v.y*dt; a.array[i*3+2]+=v.z*dt;
    v.multiplyScalar(1-1.8*dt);
  }
  a.needsUpdate = true;
  burst.pts.material.opacity = 1-t;
}

/* ================= helpers ================= */
function sci(n){
  if(!isFinite(n)) return '∞';
  if(n===0) return '0';
  const e = Math.floor(Math.log10(Math.abs(n)));
  if(e>=0 && e<4) return (+n.toPrecision(3)).toLocaleString('en-US');
  const m = n/Math.pow(10,e);
  const es = String(e).split('').map(c=>c==='-'?'⁻':SUP[+c]).join('');
  return m.toFixed(2)+'×10'+es;
}

/* ================= telemetry ================= */
const teleBody = $('teleBody');
let fps=60, fpsAcc=0, fpsN=0, fpsT=0;
function updateTelemetry(){
  const rWorld = camera.position.length();          // distance to singularity (scene units)
  const rUnits = rWorld/scaleCur;                   // in Rs units
  const rsKm = 2.95e6*massVal;
  const distKm = Math.max(0,(rUnits-1))*rsKm;
  const dil = rUnits>1.0005 ? 1/Math.sqrt(1-1/rUnits) : Infinity;
  teleBody.innerHTML =
    `DIST→HORIZON  <span class="val">${sci(distKm)} km</span>\n`+
    `TIME DILATION <span class="val">×${isFinite(dil)?dil.toFixed(3):'∞'}</span>\n`+
    `MASS          <span class="val">${sci(massVal*1e6)} M☉</span>\n`+
    `SCHWARZ. RAD  <span class="val">${sci(rsKm)} km</span>\n`+
    `TIME FLOW     <span class="val">×${timeSpeed.toFixed(2)}</span>\n`+
    `FRAME RATE    <span class="val">${fps|0} FPS</span>`;
}

/* ================= markers projection ================= */
const _v = new THREE.Vector3(), _c = new THREE.Vector3(), _tc = new THREE.Vector3();
const markerVis = markerEls.map(()=>false);
function updateMarkers(){
  const show = introDone;
  for(let i=0;i<HOTSPOTS.length;i++){
    const h = HOTSPOTS[i], el = markerEls[i];
    _v.copy(h.local).applyMatrix4(bhGroup.matrixWorld);
    // occlusion by the horizon sphere
    _c.subVectors(_v, camera.position);
    const len = _c.length(); _c.divideScalar(len);
    let occluded = false;
    _tc.copy(camera.position).negate();                 // camera -> center
    const proj = _tc.dot(_c);
    if(proj>0 && proj<len){
      occluded = _tc.lengthSq() - proj*proj < (0.96*scaleCur)*(0.96*scaleCur);
    }
    _v.project(camera);
    const vis = show && _v.z <= 1 && !occluded;
    if(vis !== markerVis[i]){
      markerVis[i] = vis;
      el.classList.toggle('off', !vis);
    }
    if(vis){
      el.style.transform = `translate(${((_v.x+1)*0.5*innerWidth).toFixed(1)}px,${((1-_v.y)*0.5*innerHeight).toFixed(1)}px) translate(-50%,-50%)`;
    }
  }
}

/* ================= lens uniforms ================= */
function updateLens(){
  _v.set(0,0,0).project(camera);
  if(_v.z>1){ starUniforms.uLens.value=0; return; }
  starUniforms.uBH.value.set(_v.x,_v.y);
  const dist = camera.position.length();
  const ndcR = (scaleCur/dist)/Math.tan(camera.fov*Math.PI/360);
  starUniforms.uLens.value = 0.64*ndcR*ndcR;
  starUniforms.uAspect.value = camera.aspect;
}

/* ================= intro ================= */
function finishIntro(dockDelay){
  if(introDone) return;
  introDone = true;
  document.body.classList.add('ready');
  const ttl = document.getElementById('title');
  ttl.classList.add('show');
  setTimeout(()=>ttl.classList.add('dock'), dockDelay);
}
applyCamera();
setTimeout(()=>document.getElementById('title').classList.add('show'), 600);
flyTo({theta:0.9, phi:1.18, r:26, target:new THREE.Vector3()}, 5.0, easeOut, ()=>finishIntro(900));

/* ================= main loop ================= */
let simTime = 0, prev = now();
function pxScale(){ return innerHeight * 0.5 / Math.tan(camera.fov*Math.PI/360); }

/* power management: 60fps cap (30fps + reduced resolution when idle) */
let eco = false, lastActivity = now(), lastRender = 0, teleT = 1;
function setEco(on){
  if(eco === on) return;
  eco = on;
  renderer.setPixelRatio(on ? 1.0 : DPR_FULL);
  renderer.setSize(innerWidth, innerHeight);
}
function activity(){ lastActivity = now(); if(eco) setEco(false); }
addEventListener('pointerdown', activity, true);
addEventListener('pointermove', activity, true);
addEventListener('keydown', activity, true);
addEventListener('wheel', activity, {capture:true, passive:true});

function loop(ts){
  requestAnimationFrame(loop);
  const interval = eco ? 1000/30 : 1000/60;
  if(ts - lastRender < interval - 2) return;          // cap fps (also on 120/144 Hz displays)
  lastRender = (ts - lastRender > interval*3) ? ts : lastRender + interval;

  const t = now();
  const dt = Math.min(0.05, t-prev); prev = t;

  if(introDone && !probe && !burst && !dragging && t-lastActivity > 90) setEco(true);

  /* fps */
  fpsAcc+=dt; fpsN++;
  if(t-fpsT>0.5){ fps = fpsN/fpsAcc; fpsAcc=0; fpsN=0; fpsT=t; }

  simTime += dt*timeSpeed;

  /* smooth mass rescale */
  scaleCur += (scaleTar-scaleCur)*Math.min(1, dt*3);
  bhGroup.scale.setScalar(scaleCur);
  bhGroup.updateMatrixWorld();

  /* camera */
  stepFly(dt);
  if(!fly && introDone && !dragging && (t-lastInput>3)){
    sph.theta += (cardOpen?0.015:0.035)*dt*60*0.016;  // gentle cinematic orbit
  }
  applyCamera();

  /* uniforms */
  const px = pxScale()*0.06*scaleCur;
  diskUniforms.uTime.value = simTime;
  diskUniforms.uBright.value = brightness;
  diskUniforms.uPx.value = px;
  jetUniforms.uTime.value = simTime;
  jetUniforms.uPx.value = px;
  photonRing.material.opacity = 0.55 + 0.45*Math.min(1,brightness);
  diskGlow.material.opacity = 0.22*brightness;
  updateLens();

  stepProbe(dt*Math.max(0.05,timeSpeed));
  stepBurst(dt*Math.max(0.05,timeSpeed));

  updateMarkers();
  teleT += dt;
  if(teleT >= 0.25){ teleT = 0; updateTelemetry(); }

  renderer.render(scene, camera);
}
requestAnimationFrame(loop);

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
